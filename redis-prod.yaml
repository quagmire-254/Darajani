version: '3.8'
services:
  redis-master:
    image: redis:7-alpine
    command: redis-server --appendonly yes --save 60 1 --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-master-data:/data
    networks:
      - redis-net
    deploy:
      resources:
        limits:
          memory: 2G

  redis-sentinel-1:
    image: redis:7-alpine
    command: redis-sentinel /sentinel.conf
    volumes:
      - ./sentinel.conf:/sentinel.conf:ro
    depends_on:
      - redis-master
    networks:
      - redis-net

  redis-sentinel-2:
    image: redis:7-alpine
    command: redis-sentinel /sentinel.conf
    volumes:
      - ./sentinel.conf:/sentinel.conf:ro
    depends_on:
      - redis-master
    networks:
      - redis-net

  redis-sentinel-3:
    image: redis:7-alpine
    command: redis-sentinel /sentinel.conf
    volumes:
      - ./sentinel.conf:/sentinel.conf:ro
    depends_on:
      - redis-master
    networks:
      - redis-net

volumes:
  redis-master-data:

networks:
  redis-net:
    driver: bridge
